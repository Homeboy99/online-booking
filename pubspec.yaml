name: online_booking
description: "A premium bus ticket booking application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0

  # Firebase
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  google_sign_in: ^7.2.0

  # Notifications & Offline Alarms
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  file_picker: ^12.0.0-beta.5

  # State Management & DI
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Networking & API
  dio: ^5.7.0
  retrofit: ^4.4.1
  url_launcher: ^6.3.1

  # UI & UX
  google_maps_flutter: ^2.10.0
  flutter_polyline_points: ^3.1.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0
  shimmer: ^3.0.0
  animate_do: ^5.1.0
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  permission_handler: ^12.0.3
  gal: ^2.3.2

  # Security & Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.6
  flutter_secure_storage: ^10.3.1

  # Local Storage & Utils
  shared_preferences: ^2.3.5
  geolocator: ^14.0.2
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutterwave_standard: ^1.1.0
  firebase_messaging: ^16.3.0
  firebase_in_app_messaging: ^0.9.2+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.4
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.9.0
  retrofit_generator: ^10.2.6
  flutter_launcher_icons: ^0.14.3
  shimmer: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo
    - assets/lottie/
    - assets/vectors/
    - assets/icon/app_icon.png
    - assets/images/kilimanjaro_royal_express_bus.png
